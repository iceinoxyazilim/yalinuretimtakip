<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yalın Üretim Takip</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f5fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-wrapper {
            width: 100%;
            max-width: 1500px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -10px rgba(0,20,40,0.3);
            padding: 28px 32px;
            transition: 0.2s;
        }
        h1 {
            font-weight: 500;
            font-size: 26px;
            color: #0b2b4a;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #e6edf5;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }
        .login-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            background: #f8fcff;
            border-radius: 40px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
            min-height: 300px;
        }
        .login-overlay h2 {
            font-weight: 400;
            color: #1a3d5e;
            margin-bottom: 20px;
        }
        .login-box {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
            align-items: flex-end;
            background: white;
            padding: 30px 40px;
            border-radius: 60px;
            box-shadow: 0 8px 24px rgba(0,20,40,0.08);
            max-width: 700px;
            width: 100%;
            justify-content: center;
        }
        .login-box .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 140px;
            flex: 1 1 130px;
        }
        .login-box label {
            font-weight: 500;
            color: #1f3a57;
            font-size: 14px;
        }
        .login-box input {
            padding: 10px 18px;
            border: 1px solid #c7d8ea;
            border-radius: 40px;
            font-size: 15px;
            background: #fafdff;
            width: 100%;
        }
        .login-box button {
            background: #1f3a57;
            border: none;
            color: white;
            padding: 10px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
            margin-top: 4px;
            flex: 0 0 auto;
        }
        .login-box button:hover { background: #2a4b70; transform: scale(0.97); }
        .login-error {
            color: #b13e3e;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
            min-height: 24px;
        }
        .user-badge {
            background: #dce6f0;
            padding: 4px 20px;
            border-radius: 50px;
            font-weight: 500;
            color: #0b2b4a;
            display: inline-block;
        }
        .main-content {
            display: none;
            animation: fadeIn 0.25s;
        }
        .main-content.visible {
            display: block;
        }
        @keyframes fadeIn { from { opacity:0.2; } to { opacity:1; } }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: #f3f8fe;
            padding: 8px 18px 8px 24px;
            border-radius: 60px;
            margin-bottom: 24px;
        }
        .logout-btn {
            background: #6f8ba5;
            border: none;
            color: white;
            padding: 6px 22px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .logout-btn:hover { background: #56738f; }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e0e9f2;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 28px;
            font-size: 17px;
            font-weight: 600;
            color: #5f7b9a;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #1f3a57;
            color: white;
        }
        .tab-btn:not(.active):hover { background: #e3ecf5; }
        .tab-content { display: none; animation: fade 0.2s; }
        .tab-content.active { display: block; }
        @keyframes fade { from { opacity:0.3; } to { opacity:1; } }
        .card {
            background: #f9fcff;
            border-radius: 20px;
            padding: 24px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 6px 12px rgba(0,20,40,0.05);
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: flex-end;
        }
        .form-group {
            flex: 1 1 180px;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #1f3a57;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group select, .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cdddee;
            border-radius: 30px;
            background: white;
            font-size: 15px;
        }
        .btn-primary {
            background: #0f7b3a;
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 8px rgba(15, 123, 58, 0.15);
        }
        .btn-primary:hover { background: #0d6a30; transform: scale(0.98); }
        .btn-warning {
            background: #d48c1f;
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-warning:hover { background: #b87718; transform: scale(0.98); }
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 20px;
            background: #eef4fa;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 24px;
        }
        .filter-bar .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-bar label {
            font-weight: 500;
            color: #1f3a57;
        }
        .filter-bar input, .filter-bar select {
            border: 1px solid #c8d9eb;
            border-radius: 30px;
            padding: 6px 16px;
            background: white;
        }
        .btn-excel {
            background: #1f7b4d;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-excel:hover { background: #15643b; }
        .btn-danger {
            background: #b13e3e;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-danger:hover { background: #942f2f; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        th {
            background: #e3ecf5;
            color: #1b3550;
            font-weight: 600;
            padding: 14px 12px;
            text-align: left;
            cursor: pointer;
            user-select: none;
        }
        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e8eef6;
        }
        tr:hover td { background: #f4f9ff; }
        .no-data { padding: 30px; text-align: center; color: #6a7f98; }
        .checkbox-col { width: 40px; text-align: center; }
        .delete-col { width: 60px; text-align: center; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: table-cell; }
        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }
        .counter-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .counter-active { background: #d4edda; color: #155724; }
        .counter-completed { background: #d4edda; color: #155724; border-left: 4px solid green; }
        .counter-expired { background: #f8d7da; color: #721c24; border-left: 4px solid red; }
        .status-btn {
            padding: 4px 12px;
            border-radius: 20px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .status-btn.complete { background: #28a745; color: white; }
        .status-btn.complete:hover { background: #218838; }
        .status-btn.expired { background: #ffc107; color: #212529; }
        .status-btn.expired:hover { background: #e0a800; }
        .alarm-list-item {
            background: #e3ecf5;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 4px;
        }
        .alarm-actions {
            display: flex;
            gap: 6px;
        }
        .alarm-actions button {
            padding: 2px 10px;
            border-radius: 12px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: 0.15s;
        }
        .alarm-actions .edit-btn { background: #ffc107; color: #212529; }
        .alarm-actions .edit-btn:hover { background: #e0a800; }
        .alarm-actions .delete-btn-sm { background: #dc3545; color: white; }
        .alarm-actions .delete-btn-sm:hover { background: #c82333; }
        .simple-complete-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .simple-complete-btn:hover { background: #218838; }
        @media (max-width: 700px) {
            .app-wrapper { padding: 16px; }
            .login-box { flex-direction: column; align-items: stretch; border-radius: 30px; padding: 24px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .top-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
    <h1>📋 Yalın Üretim Takip</h1>

    <!-- LOGIN -->
    <div id="loginOverlay" class="login-overlay">
        <h2>🔐 Giriş Yap</h2>
        <div class="login-box">
            <div class="field">
                <label>Kullanıcı</label>
                <input type="text" id="loginUsername" placeholder="Kullanıcı adı">
            </div>
            <div class="field">
                <label>Şifre</label>
                <input type="password" id="loginPassword" placeholder="Şifre">
            </div>
            <button id="loginBtnMain">Giriş</button>
        </div>
        <div id="loginError" class="login-error"></div>
        <div style="margin-top:12px; font-size:13px; color:#6a7f98;">
            <span style="margin-right:16px;">Admin: supervisor</span>
            <span>Personel: 2026ysg</span>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="mainContent" class="main-content">
        <div class="top-bar">
            <div class="left">
                <span id="userDisplay" class="user-badge">👤 Admin</span>
            </div>
            <div class="right">
                <button id="logoutBtnMain" class="logout-btn">🚪 Çıkış</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tab1">📝 Kayıt Ekle</button>
            <button class="tab-btn" data-tab="tab2">📊 Kayıtlar</button>
            <button class="tab-btn admin-only" data-tab="tab3">⏱️ Alarm Yönetimi</button>
        </div>

        <!-- TAB 1: Kayıt Ekle -->
        <div id="tab1" class="tab-content active">
            <div class="card">
                <div class="row">
                    <div class="form-group">
                        <label>Grup</label>
                        <select id="groupSelect">
                            <option value="">— Seçin —</option>
                            <option value="T">T</option><option value="U">U</option><option value="V">V</option>
                            <option value="D">D</option><option value="C">C</option><option value="BLC">BLC</option>
                            <option value="MT">MT</option><option value="O">O</option><option value="GT">GT</option>
                            <option value="SP">SP</option><option value="GD">GD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sıra No (1-150)</label>
                        <input type="number" id="siraInput" min="1" max="150" placeholder="1-150">
                    </div>
                    <div class="form-group" style="flex:0 0 auto;">
                        <button class="btn-primary" id="saveRecordBtn">✅ Kaydet</button>
                    </div>
                </div>
                <div style="margin-top:10px; color:#2f5a7a; font-size:14px;" id="saveMessage"></div>
            </div>
        </div>

        <!-- TAB 2: Kayıtlar -->
        <div id="tab2" class="tab-content">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>📅 Tarih:</label>
                    <input type="date" id="filterDate">
                </div>
                <div class="filter-group">
                    <label>📦 Ürün:</label>
                    <input type="text" id="filterProduct" placeholder="örn: T-42" style="width:140px;">
                </div>
                <div>
                    <button class="btn-excel" id="exportAllBtn">📤 Tümünü Excele Aktar</button>
                    <button class="btn-excel" id="exportSelectedBtn" style="background:#2a6b96;">📥 Seçilenleri Excele Aktar</button>
                    <button class="btn-danger" id="clearFiltersBtn">✖ Temizle</button>
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table id="recordsTable">
                    <thead>
                        <tr>
                            <th class="checkbox-col"><input type="checkbox" id="selectAllCheckbox"></th>
                            <th data-sort="product">Ürün ⬍</th>
                            <th data-sort="timestamp">Kayıt Saati ⬍</th>
                            <th data-sort="date">Tarih ⬍</th>
                            <th data-sort="user">Kullanıcı ⬍</th>
                            <th>Sayaç</th>
                            <th>Durum</th>
                            <th class="delete-col admin-only">Sil</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        <tr><td colspan="8" class="no-data">Yükleniyor...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="footer-actions">
                <span style="color:#2b4f6e; font-size:14px;" id="recordCount">0 kayıt</span>
            </div>
        </div>

        <!-- TAB 3: Alarm Yönetimi -->
        <div id="tab3" class="tab-content admin-only">
            <div class="card">
                <h3 style="margin-bottom:16px; color:#1f3a57;">⏱️ Sayaç / Alarm Yönetimi</h3>
                <div class="row">
                    <div class="form-group">
                        <label>Grup</label>
                        <select id="alarmGroupSelect">
                            <option value="">— Seçin —</option>
                            <option value="T">T</option><option value="U">U</option><option value="V">V</option>
                            <option value="D">D</option><option value="C">C</option><option value="BLC">BLC</option>
                            <option value="MT">MT</option><option value="O">O</option><option value="GT">GT</option>
                            <option value="SP">SP</option><option value="GD">GD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sıra No (1-150)</label>
                        <input type="number" id="alarmSiraInput" min="1" max="150" placeholder="1-150">
                    </div>
                    <div class="form-group">
                        <label>Süre (dakika, 1-5000)</label>
                        <input type="number" id="alarmDurationInput" min="1" max="5000" placeholder="1-5000 dk">
                    </div>
                    <div class="form-group" style="flex:0 0 auto;">
                        <button class="btn-warning" id="setAlarmBtn">⏱️ Kur/Güncelle</button>
                    </div>
                </div>
                <div style="margin-top:10px; color:#2f5a7a; font-size:14px;" id="alarmMessage"></div>
            </div>
            <div class="card">
                <h4 style="color:#1f3a57; margin-bottom:12px;">📋 Tanımlı Sayaçlar</h4>
                <div id="activeCountersList" style="background:#f9fcff; border-radius:16px; padding:8px;">
                    <p style="color:#6a7f98;">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ----- FIREBASE -----
    const firebaseConfig = {
        apiKey: "AIzaSyATKEa3xR_uybxRnjkFscIoGDQgJjcBGlg",
        authDomain: "yuretimtakip.firebaseapp.com",
        databaseURL: "https://yuretimtakip-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "yuretimtakip",
        storageBucket: "yuretimtakip.firebasestorage.app",
        messagingSenderId: "431035450549",
        appId: "1:431035450549:web:61207d77f2c51d078eeafc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ----- STATE -----
    let currentUser = null;
    let allRecords = [];
    let filteredRecords = [];
    let sortField = 'timestamp';
    let sortAsc = false;

    // DOM refs
    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const loginUsername = document.getElementById('loginUsername');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtnMain = document.getElementById('loginBtnMain');
    const loginError = document.getElementById('loginError');
    const logoutBtnMain = document.getElementById('logoutBtnMain');
    const userDisplay = document.getElementById('userDisplay');
    const appWrapper = document.getElementById('appWrapper');

    // ----- HASH -----
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return Math.abs(hash).toString(16);
    }
    const USER_HASHES = {
        'admin': simpleHash('supervisor'),
        'personel': simpleHash('2026ysg')
    };

    function validateUser(username, password) {
        if (username !== 'admin' && username !== 'personel') return null;
        if (USER_HASHES[username] === simpleHash(password)) return username;
        return null;
    }

    // ----- YETKİ -----
    function setUser(role) {
        currentUser = role;
        if (role === 'admin') {
            appWrapper.classList.add('is-admin');
            userDisplay.textContent = '👑 Admin';
        } else if (role === 'personel') {
            appWrapper.classList.remove('is-admin');
            userDisplay.textContent = '🧑‍💼 Personel';
        } else {
            appWrapper.classList.remove('is-admin');
            userDisplay.textContent = '👤 Çıkış yapıldı';
            currentUser = null;
        }
        document.querySelectorAll('.admin-only').forEach(el => {
            el.style.display = (role === 'admin') ? '' : 'none';
        });
        if (role) {
            loginOverlay.style.display = 'none';
            mainContent.classList.add('visible');
        } else {
            loginOverlay.style.display = 'flex';
            mainContent.classList.remove('visible');
        }
        if (role) {
            sessionStorage.setItem('currentUser', role);
        } else {
            sessionStorage.removeItem('currentUser');
        }
        applyFiltersAndRender();
    }

    // ----- SESSION KONTROL -----
    function checkSession() {
        const savedUser = sessionStorage.getItem('currentUser');
        if (savedUser && (savedUser === 'admin' || savedUser === 'personel')) {
            setUser(savedUser);
            return true;
        }
        return false;
    }

    // ----- GİRİŞ -----
    function handleLogin() {
        const user = loginUsername.value.trim();
        const pass = loginPassword.value.trim();
        if (!user || !pass) {
            loginError.textContent = '❌ Kullanıcı adı ve şifre gerekli';
            return;
        }
        const validated = validateUser(user, pass);
        if (validated) {
            setUser(validated);
            loginError.textContent = '';
            loginPassword.value = '';
            loginUsername.value = '';
        } else {
            loginError.textContent = '❌ Kullanıcı veya şifre hatalı';
            loginPassword.value = '';
        }
    }

    loginBtnMain.addEventListener('click', handleLogin);
    loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
    loginUsername.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });

    logoutBtnMain.addEventListener('click', () => {
        setUser(null);
        loginUsername.value = '';
        loginPassword.value = '';
        loginError.textContent = '';
        allRecords = [];
        filteredRecords = [];
        renderTable([]);
    });

    // ----- KAYIT EKLE -----
    document.getElementById('saveRecordBtn').addEventListener('click', function() {
        if (!currentUser) {
            document.getElementById('saveMessage').textContent = '⛔ Lütfen giriş yapın.';
            return;
        }
        const group = document.getElementById('groupSelect').value;
        const sira = parseInt(document.getElementById('siraInput').value);
        if (!group) {
            document.getElementById('saveMessage').textContent = '⚠️ Lütfen bir Grup seçin.';
            return;
        }
        if (isNaN(sira) || sira < 1 || sira > 150) {
            document.getElementById('saveMessage').textContent = '⚠️ Sıra No 1-150 arasında olmalı.';
            return;
        }
        const product = `${group}-${sira}`;
        const now = new Date();
        const dateStr = now.toLocaleDateString('tr-TR');
        const timeStr = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        const timestamp = now.getTime();

        let counter = null;
        let counterEnd = null;
        const alarmRecord = allRecords.find(r => r.product === product && r.counter !== null && r.counter !== undefined);
        if (alarmRecord) {
            counter = alarmRecord.counter;
            counterEnd = alarmRecord.counterEnd;
        }

        const newRecord = {
            group, sira, product, timestamp, date: dateStr, time: timeStr, user: currentUser,
            counter: counter || null,
            counterEnd: counterEnd || null,
            status: 'active',
            completedAt: null,
            elapsedWhenCompleted: null
        };

        db.ref('records').push(newRecord)
            .then(() => {
                document.getElementById('saveMessage').textContent = `✅ Kaydedildi: ${product} ${counter ? '(Sayaç: '+counter+' dk)' : ''}`;
                document.getElementById('siraInput').value = '';
            })
            .catch(err => {
                document.getElementById('saveMessage').textContent = `❌ Hata: ${err.message}`;
            });
    });

    // ----- ALARM KUR / GÜNCELLE (SADECE ADMIN) -----
    document.getElementById('setAlarmBtn').addEventListener('click', function() {
        if (currentUser !== 'admin') {
            document.getElementById('alarmMessage').textContent = '⛔ Sadece admin yetkilidir.';
            return;
        }
        const group = document.getElementById('alarmGroupSelect').value;
        const sira = parseInt(document.getElementById('alarmSiraInput').value);
        const duration = parseInt(document.getElementById('alarmDurationInput').value);
        if (!group) {
            document.getElementById('alarmMessage').textContent = '⚠️ Grup seçin.';
            return;
        }
        if (isNaN(sira) || sira < 1 || sira > 150) {
            document.getElementById('alarmMessage').textContent = '⚠️ Sıra No 1-150 arasında olmalı.';
            return;
        }
        if (isNaN(duration) || duration < 1 || duration > 5000) {
            document.getElementById('alarmMessage').textContent = '⚠️ Süre 1-5000 dakika arasında olmalı.';
            return;
        }
        const product = `${group}-${sira}`;
        const now = Date.now();
        const endTime = now + duration * 60000;

        const existing = allRecords.find(r => r.product === product);
        
        if (existing) {
            db.ref('records/' + existing.id).update({
                counter: duration,
                counterEnd: endTime,
                status: 'active',
                completedAt: null,
                elapsedWhenCompleted: null
            }).then(() => {
                document.getElementById('alarmMessage').textContent = `✅ Sayaç güncellendi: ${product} ${duration} dk`;
                document.getElementById('alarmSiraInput').value = '';
                document.getElementById('alarmDurationInput').value = '';
            }).catch(err => {
                document.getElementById('alarmMessage').textContent = `❌ Hata: ${err.message}`;
            });
        } else {
            const now2 = new Date();
            const dateStr = now2.toLocaleDateString('tr-TR');
            const timeStr = now2.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            const alarmRecord = {
                group, sira, product,
                timestamp: now2.getTime(),
                date: dateStr,
                time: timeStr,
                user: 'admin',
                counter: duration,
                counterEnd: endTime,
                status: 'active',
                completedAt: null,
                elapsedWhenCompleted: null
            };
            db.ref('records').push(alarmRecord)
                .then(() => {
                    document.getElementById('alarmMessage').textContent = `✅ Sayaç kuruldu: ${product} ${duration} dk`;
                    document.getElementById('alarmSiraInput').value = '';
                    document.getElementById('alarmDurationInput').value = '';
                })
                .catch(err => {
                    document.getElementById('alarmMessage').textContent = `❌ Hata: ${err.message}`;
                });
        }
    });

    // ----- SAYAÇ SİL (ADMIN) -----
    window.deleteCounter = function(product) {
        if (currentUser !== 'admin') {
            document.getElementById('alarmMessage').textContent = '⛔ Sadece admin yetkilidir.';
            return;
        }
        const recordsToUpdate = allRecords.filter(r => r.product === product && r.counter !== null);
        if (recordsToUpdate.length === 0) {
            document.getElementById('alarmMessage').textContent = `⚠️ ${product} için tanımlı sayaç bulunamadı.`;
            return;
        }
        if (!confirm(`${product} için sayaç silinecek. Devam etmek istediğinize emin misiniz?`)) return;

        let updates = {};
        recordsToUpdate.forEach(rec => {
            updates[rec.id] = { counter: null, counterEnd: null, status: 'active', completedAt: null, elapsedWhenCompleted: null };
        });

        const dbRef = db.ref('records');
        const updatePromises = Object.keys(updates).map(key => {
            return dbRef.child(key).update(updates[key]);
        });

        Promise.all(updatePromises)
            .then(() => {
                document.getElementById('alarmMessage').textContent = `✅ ${product} için sayaç silindi.`;
            })
            .catch(err => {
                document.getElementById('alarmMessage').textContent = `❌ Hata: ${err.message}`;
            });
    };

    // ----- SAYAÇ DÜZENLE (ADMIN) -----
    window.editCounter = function(product) {
        const record = allRecords.find(r => r.product === product && r.counter !== null);
        if (!record) {
            document.getElementById('alarmMessage').textContent = `⚠️ ${product} için sayaç bulunamadı.`;
            return;
        }
        const parts = product.split('-');
        document.getElementById('alarmGroupSelect').value = parts[0];
        document.getElementById('alarmSiraInput').value = parseInt(parts[1]);
        document.getElementById('alarmDurationInput').value = record.counter;
        document.getElementById('alarmMessage').textContent = `✏️ ${product} için düzenleme modu. Süreyi değiştirip "Kur/Güncelle" butonuna tıklayın.`;
        document.getElementById('alarmDurationInput').focus();
        document.getElementById('alarmDurationInput').select();
    };

    // ----- VERİ ÇEKME -----
    function fetchRecords() {
        db.ref('records').orderByChild('timestamp').on('value', snapshot => {
            const data = snapshot.val();
            allRecords = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    allRecords.push({
                        id: key,
                        group: item.group || '',
                        sira: item.sira || '',
                        product: item.product || '',
                        timestamp: item.timestamp || 0,
                        date: item.date || '',
                        time: item.time || '',
                        user: item.user || '',
                        counter: item.counter || null,
                        counterEnd: item.counterEnd || null,
                        status: item.status || 'active',
                        completedAt: item.completedAt || null,
                        elapsedWhenCompleted: item.elapsedWhenCompleted || null
                    });
                });
            }
            allRecords.sort((a,b) => b.timestamp - a.timestamp);
            applyFiltersAndRender();
            updateActiveCounters();
        });
    }

    // ----- TANIMLI SAYAÇLARI GÖSTER (SADECE TAB3) -----
    function updateActiveCounters() {
        const container = document.getElementById('activeCountersList');
        if (!container) return;
        const counters = allRecords.filter(r => r.counter !== null && r.counter !== undefined);
        const uniqueProducts = {};
        counters.forEach(r => {
            if (!uniqueProducts[r.product]) {
                uniqueProducts[r.product] = r;
            }
        });
        const uniqueList = Object.values(uniqueProducts);
        
        if (uniqueList.length === 0) {
            container.innerHTML = '<p style="color:#6a7f98;">Tanımlı sayaç yok.</p>';
            return;
        }
        let html = '<div style="display:flex; flex-wrap:wrap; gap:8px;">';
        uniqueList.forEach(r => {
            const now = Date.now();
            const remaining = Math.max(0, Math.round((r.counterEnd - now) / 60000));
            let statusText = '';
            if (r.status === 'completed') {
                const elapsed = r.elapsedWhenCompleted || Math.round((r.completedAt - (r.counterEnd - r.counter * 60000)) / 60000);
                statusText = `✅ Tamamlandı (${elapsed} dk)`;
            } else if (r.status === 'expired') {
                const elapsed = Math.round((now - (r.counterEnd - r.counter * 60000)) / 60000);
                statusText = `⏰ Süre Doldu (${elapsed} dk)`;
            } else {
                statusText = `${remaining} dk kaldı`;
            }
            html += `<span class="alarm-list-item">
                <strong>${r.product}</strong> 
                <span style="color:#1f3a57;">${r.counter} dk</span>
                <span style="font-size:13px; color:#5f7b9a;">${statusText}</span>
                <span class="alarm-actions">
                    <button class="edit-btn" onclick="editCounter('${r.product}')">✏️</button>
                    <button class="delete-btn-sm" onclick="deleteCounter('${r.product}')">🗑️</button>
                </span>
            </span>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    // ----- FİLTRE & SIRALAMA -----
    function applyFiltersAndRender() {
        const filterDateVal = document.getElementById('filterDate').value;
        const filterProductVal = document.getElementById('filterProduct').value.trim().toUpperCase();

        let filtered = allRecords.filter(rec => {
            if (filterDateVal) {
                const parts = rec.date.split('.');
                if (parts.length === 3) {
                    const recDate = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
                    if (recDate !== filterDateVal) return false;
                } else return false;
            }
            if (filterProductVal) {
                if (!rec.product.toUpperCase().includes(filterProductVal)) return false;
            }
            return true;
        });

        filtered.sort((a,b) => {
            let valA, valB;
            if (sortField === 'product') { valA = a.product; valB = b.product; }
            else if (sortField === 'timestamp' || sortField === 'date') { valA = a.timestamp; valB = b.timestamp; }
            else if (sortField === 'user') { valA = a.user; valB = b.user; }
            else { valA = a.timestamp; valB = b.timestamp; }
            if (typeof valA === 'string') {
                return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                return sortAsc ? valA - valB : valB - valA;
            }
        });

        filteredRecords = filtered;
        renderTable(filtered);
        document.getElementById('recordCount').textContent = `${filtered.length} kayıt`;
        updateActiveCounters();
    }

    // ----- TABLO RENDER -----
    function renderTable(records) {
        const tbody = document.getElementById('recordsBody');
        if (!records || records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="no-data">📭 Kayıt bulunamadı</td></tr>`;
            return;
        }
        const isAdmin = (currentUser === 'admin');
        let html = '';
        records.forEach((rec) => {
            let counterDisplay = '-';
            let statusDisplay = 'Aktif';
            let statusClass = 'counter-active';
            let btnHtml = '';

            if (rec.counter) {
                const now = Date.now();
                const startTime = rec.counterEnd - rec.counter * 60000;
                let elapsed = 0;
                
                if (rec.status === 'completed') {
                    elapsed = rec.elapsedWhenCompleted !== null ? rec.elapsedWhenCompleted : Math.round((rec.completedAt - startTime) / 60000);
                    counterDisplay = `✅ Tamamlandı (${elapsed} dk geçti)`;
                    statusDisplay = 'Tamamlandı';
                    statusClass = 'counter-completed';
                } else if (rec.status === 'expired') {
                    elapsed = Math.round((now - startTime) / 60000);
                    counterDisplay = `⏰ Süre doldu (${elapsed} dk geçti)`;
                    statusDisplay = 'Süre Doldu';
                    statusClass = 'counter-expired';
                } else {
                    const remaining = Math.max(0, Math.round((rec.counterEnd - now) / 60000));
                    if (remaining > 0) {
                        counterDisplay = `⏱️ ${remaining} dk kaldı`;
                        statusDisplay = 'Sayaç aktif';
                        statusClass = 'counter-active';
                    } else {
                        elapsed = Math.round((now - startTime) / 60000);
                        counterDisplay = `⏰ Süre doldu (${elapsed} dk geçti)`;
                        statusDisplay = 'Süre Doldu';
                        statusClass = 'counter-expired';
                        if (rec.status !== 'expired' && rec.status !== 'completed') {
                            db.ref('records/' + rec.id).update({ status: 'expired' });
                        }
                    }
                }
            } else {
                // Sayaçsız kayıtlar için durum
                if (rec.status === 'completed') {
                    statusDisplay = '✅ Tamamlandı';
                    statusClass = 'counter-completed';
                }
            }

            // Tamamlandı butonu - TÜM KAYITLAR İÇİN (sayaçlı veya sayaçsız)
            if (rec.status !== 'completed') {
                btnHtml = `<button class="status-btn complete" data-id="${rec.id}">✅ Tamamlandı</button>`;
            } else {
                btnHtml = `<span style="color:#28a745;">✅ Tamamlandı</span>`;
            }

            const checked = rec._checked ? 'checked' : '';
            html += `<tr>
                <td class="checkbox-col"><input type="checkbox" class="row-checkbox" data-id="${rec.id}" ${checked}></td>
                <td><strong>${rec.product}</strong></td>
                <td>${rec.time || ''}</td>
                <td>${rec.date || ''}</td>
                <td>${rec.user || ''}</td>
                <td><span class="counter-badge ${statusClass}">${counterDisplay}</span></td>
                <td>${btnHtml}</td>
                <td class="delete-col admin-only">${isAdmin ? `<button class="delete-btn" data-id="${rec.id}" style="background:transparent; border:none; color:#b13e3e; font-size:18px; cursor:pointer;">🗑️</button>` : ''}</td>
            </tr>`;
        });
        tbody.innerHTML = html;

        document.querySelectorAll('.row-checkbox').forEach(cb => {
            cb.addEventListener('change', function() {
                const id = this.dataset.id;
                const rec = filteredRecords.find(r => r.id === id);
                if (rec) rec._checked = this.checked;
                updateSelectAllState();
            });
        });

        // Tamamlandı butonu - TÜM KAYITLAR İÇİN
        document.querySelectorAll('.status-btn.complete').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                if (confirm('Bu ürünü tamamlandı olarak işaretlemek istediğinize emin misiniz?')) {
                    const rec = allRecords.find(r => r.id === id);
                    if (rec && rec.counter) {
                        // Sayaçlı kayıt - elapsed hesapla
                        const startTime = rec.counterEnd - rec.counter * 60000;
                        const elapsed = Math.round((Date.now() - startTime) / 60000);
                        db.ref('records/' + id).update({ 
                            status: 'completed',
                            completedAt: Date.now(),
                            elapsedWhenCompleted: elapsed
                        }).catch(err => alert('Hata: ' + err.message));
                    } else {
                        // Sayaçsız kayıt - sadece status güncelle
                        db.ref('records/' + id).update({ 
                            status: 'completed',
                            completedAt: Date.now()
                        }).catch(err => alert('Hata: ' + err.message));
                    }
                }
            });
        });

        if (isAdmin) {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.id;
                    if (confirm('Bu kaydı silmek istediğinize emin misiniz?')) {
                        db.ref('records/' + id).remove().catch(err => alert('Silme hatası: ' + err.message));
                    }
                });
            });
        }

        document.querySelectorAll('#recordsTable th[data-sort]').forEach(th => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', function() {
                const field = this.dataset.sort;
                if (sortField === field) {
                    sortAsc = !sortAsc;
                } else {
                    sortField = field;
                    sortAsc = (field === 'timestamp' || field === 'date') ? false : true;
                }
                applyFiltersAndRender();
            });
        });
        updateSelectAllState();
    }

    function updateSelectAllState() {
        const checkboxes = document.querySelectorAll('.row-checkbox');
        const checked = document.querySelectorAll('.row-checkbox:checked');
        const selectAll = document.getElementById('selectAllCheckbox');
        if (checkboxes.length > 0 && checked.length === checkboxes.length) {
            selectAll.checked = true;
        } else {
            selectAll.checked = false;
        }
    }

    document.getElementById('selectAllCheckbox').addEventListener('change', function() {
        const checked = this.checked;
        document.querySelectorAll('.row-checkbox').forEach(cb => {
            cb.checked = checked;
            const id = cb.dataset.id;
            const rec = filteredRecords.find(r => r.id === id);
            if (rec) rec._checked = checked;
        });
    });

    // ----- FİLTRE OLAYLARI -----
    document.getElementById('filterDate').addEventListener('change', applyFiltersAndRender);
    document.getElementById('filterProduct').addEventListener('input', applyFiltersAndRender);
    document.getElementById('clearFiltersBtn').addEventListener('click', function() {
        document.getElementById('filterDate').value = '';
        document.getElementById('filterProduct').value = '';
        applyFiltersAndRender();
    });

    // ----- EXCEL AKTAR -----
    function exportToExcel(recordsToExport) {
        if (!recordsToExport || recordsToExport.length === 0) {
            alert('Aktarılacak kayıt yok.');
            return;
        }
        const rows = [['Ürün', 'Kayıt Saati', 'Tarih', 'Kullanıcı', 'Sayaç', 'Durum']];
        recordsToExport.forEach(rec => {
            let counterText = '-';
            if (rec.counter) {
                const startTime = rec.counterEnd - rec.counter * 60000;
                let elapsed = Math.round((Date.now() - startTime) / 60000);
                if (rec.status === 'completed' && rec.elapsedWhenCompleted !== null) {
                    elapsed = rec.elapsedWhenCompleted;
                } else if (rec.status === 'completed' && rec.elapsedWhenCompleted === null && rec.completedAt) {
                    elapsed = Math.round((rec.completedAt - startTime) / 60000);
                }
                if (rec.status === 'completed') counterText = `Tamamlandı (${elapsed} dk)`;
                else if (rec.status === 'expired') counterText = `Süre doldu (${elapsed} dk)`;
                else {
                    const remaining = Math.max(0, Math.round((rec.counterEnd - Date.now()) / 60000));
                    counterText = `${remaining} dk kaldı`;
                }
            } else {
                if (rec.status === 'completed') counterText = 'Tamamlandı';
            }
            const statusText = rec.status === 'completed' ? 'Tamamlandı' : 'Aktif';
            rows.push([rec.product, rec.time || '', rec.date || '', rec.user || '', counterText, statusText]);
        });
        let csv = rows.map(row => row.join(';')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `uretim_kayitlari_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    document.getElementById('exportAllBtn').addEventListener('click', function() {
        if (!currentUser) { alert('Giriş yapmalısınız.'); return; }
        exportToExcel(filteredRecords);
    });

    document.getElementById('exportSelectedBtn').addEventListener('click', function() {
        if (!currentUser) { alert('Giriş yapmalısınız.'); return; }
        const selected = filteredRecords.filter(r => r._checked === true);
        if (selected.length === 0) {
            alert('Hiç kayıt seçilmedi.');
            return;
        }
        exportToExcel(selected);
    });

    // ----- SEKMELER -----
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(this.dataset.tab).classList.add('active');
            if (this.dataset.tab === 'tab2' || this.dataset.tab === 'tab3') {
                applyFiltersAndRender();
            }
        });
    });

    // ----- SAYAÇ KONTROL -----
    setInterval(() => {
        const now = Date.now();
        allRecords.forEach(rec => {
            if (rec.counter && rec.status === 'active' && rec.counterEnd) {
                if (now >= rec.counterEnd) {
                    db.ref('records/' + rec.id).update({ status: 'expired' });
                }
            }
        });
        applyFiltersAndRender();
    }, 5000);

    // ----- BAŞLAT -----
    const sessionActive = checkSession();
    fetchRecords();
    if (!sessionActive) {
        setUser(null);
    }
</script>
</body>
</html>
